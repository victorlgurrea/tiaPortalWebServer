<!DOCTYPE html>
<!-- AWP_In_Variable Name='"Marcha"' -->
<!-- AWP_In_Variable Name='"Paro"' -->
<!-- AWP_In_Variable Name='"Termico"' -->
<!-- AWP_In_Variable Name='"Motor"' -->
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control Motor - S7-1500</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --start: #16a34a;
      --start-hover: #15803d;
      --stop: #dc2626;
      --stop-hover: #b91c1c;
      --card: #1f2937;
      --border: #334155;
      --neutral: #2563eb;
      --neutral-hover: #1d4ed8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0b1220 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 15px;
    }

    .status {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .status b {
      color: #f8fafc;
    }

    .traffic-lights {
      background: #0b1220;
      border: 1px solid #2b364a;
      border-radius: 20px;
      padding: 6px 8px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .light {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      opacity: 0.25;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    .light-red {
      background: #ef4444;
    }

    .light-green {
      background: #22c55e;
    }

    .light.active {
      opacity: 1;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    form {
      width: 100%;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      color: #ffffff;
      font-size: 18px;
      font-weight: bold;
      padding: 14px 10px;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    .btn-live {
      opacity: 1;
      filter: saturate(1.15) brightness(1.05);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.22), 0 10px 20px rgba(0, 0, 0, 0.25);
    }

    .btn-dim {
      opacity: 0.45;
      filter: saturate(0.7) brightness(0.8);
      box-shadow: none;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-start {
      background: var(--start);
    }

    .btn-start:hover {
      background: var(--start-hover);
    }

    .btn-stop {
      background: var(--stop);
    }

    .btn-stop:hover {
      background: var(--stop-hover);
    }

    .btn-neutral {
      background: var(--neutral);
    }

    .btn-neutral:hover {
      background: var(--neutral-hover);
    }

    .help {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    .refresh-controls {
      margin-top: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .refresh-controls label {
      font-size: 13px;
      color: var(--muted);
    }

    .refresh-select {
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
    }

    .refresh-toggle {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0b1220;
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section class="panel">
    <h1>Control de Motor</h1>
    <p class="subtitle">Web Server PLC - TIA Portal V17</p>

    <div class="status">
      <span>Estado actual: <b id="motor-value">:="Motor":</b></span>
      <div class="traffic-lights status-lights">
        <div class="light light-red active" id="light-red" title="Motor apagado"></div>
        <div class="light light-green" id="light-green" title="Motor encendido"></div>
      </div>
    </div>

    <div class="actions">
      <form method="post">
        <input type="hidden" name='"Marcha"' value="1">
        <input class="btn btn-start" id="btn-marcha-on" type="submit" value="Marcha ON">
      </form>

      <form method="post">
        <input type="hidden" name='"Marcha"' value="0">
        <input class="btn btn-stop" id="btn-marcha-off" type="submit" value="Marcha OFF">
      </form>

      <form method="post">
        <input type="hidden" name='"Paro"' value="1">
        <input class="btn btn-stop" id="btn-paro-on" type="submit" value="Paro ON">
      </form>

      <form method="post">
        <input type="hidden" name='"Paro"' value="0">
        <input class="btn btn-neutral" id="btn-paro-off" type="submit" value="Paro OFF">
      </form>

      <form method="post">
        <input type="hidden" name='"Termico"' value="1">
        <input class="btn btn-neutral" id="btn-termico-on" type="submit" value="Termico ON">
      </form>

      <form method="post">
        <input type="hidden" name='"Termico"' value="0">
        <input class="btn btn-stop" id="btn-termico-off" type="submit" value="Termico OFF">
      </form>
    </div>
    <span id="marcha-value" style="display:none">:="Marcha":</span>
    <span id="paro-value" style="display:none">:="Paro":</span>
    <span id="termico-value" style="display:none">:="Termico":</span>

    <div class="refresh-controls">
      <label for="refresh-interval">Refresco</label>
      <select id="refresh-interval" class="refresh-select">
        <option value="500">500 ms</option>
        <option value="1000" selected>1 s</option>
        <option value="2000">2 s</option>
      </select>
      <button type="button" id="refresh-toggle" class="refresh-toggle">Pausar</button>
    </div>

    <p class="help">
      Botones compatibles con OB1: escribe <b>Marcha</b>, <b>Paro</b> y <b>Termico</b>.
    </p>
  </section>

  <script>
    (function () {
      var motorElement = document.getElementById("motor-value");
      var redLight = document.getElementById("light-red");
      var greenLight = document.getElementById("light-green");
      var refreshSelect = document.getElementById("refresh-interval");
      var refreshToggle = document.getElementById("refresh-toggle");

      if (!motorElement || !redLight || !greenLight) {
        return;
      }

      function isSignalOn(rawValue) {
        var normalized = (rawValue || "").replace(/\s+/g, "").toLowerCase();
        return normalized === "1" || normalized === "true";
      }

      function paintTrafficLights(valueElementId, redId, greenId) {
        var valueElement = document.getElementById(valueElementId);
        var redElement = document.getElementById(redId);
        var greenElement = document.getElementById(greenId);

        if (!valueElement || !redElement || !greenElement) {
          return;
        }

        var isOn = isSignalOn(valueElement.textContent);

        if (isOn) {
          greenElement.classList.add("active");
          redElement.classList.remove("active");
        } else {
          redElement.classList.add("active");
          greenElement.classList.remove("active");
        }
      }

      function paintButtonState(valueElementId, onButtonId, offButtonId) {
        var valueElement = document.getElementById(valueElementId);
        var onButton = document.getElementById(onButtonId);
        var offButton = document.getElementById(offButtonId);

        if (!valueElement || !onButton || !offButton) {
          return;
        }

        var isOn = isSignalOn(valueElement.textContent);
        var activeButton = isOn ? onButton : offButton;
        var inactiveButton = isOn ? offButton : onButton;

        activeButton.classList.add("btn-live");
        activeButton.classList.remove("btn-dim");
        inactiveButton.classList.add("btn-dim");
        inactiveButton.classList.remove("btn-live");
      }

      paintTrafficLights("motor-value", "light-red", "light-green");
      paintButtonState("marcha-value", "btn-marcha-on", "btn-marcha-off");
      paintButtonState("paro-value", "btn-paro-on", "btn-paro-off");
      paintButtonState("termico-value", "btn-termico-on", "btn-termico-off");

      if (!refreshSelect || !refreshToggle) {
        return;
      }

      var KEY_ENABLED = "awpRefreshEnabled";
      var KEY_INTERVAL = "awpRefreshInterval";
      var enabledStored = sessionStorage.getItem(KEY_ENABLED);
      var intervalStored = sessionStorage.getItem(KEY_INTERVAL);
      var refreshEnabled = enabledStored !== "0";
      var refreshInterval = parseInt(intervalStored || "1000", 10);

      if (refreshInterval !== 500 && refreshInterval !== 1000 && refreshInterval !== 2000) {
        refreshInterval = 1000;
      }

      refreshSelect.value = String(refreshInterval);
      refreshToggle.textContent = refreshEnabled ? "Pausar" : "Reanudar";

      refreshSelect.addEventListener("change", function () {
        refreshInterval = parseInt(refreshSelect.value, 10);
        sessionStorage.setItem(KEY_INTERVAL, String(refreshInterval));
      });

      refreshToggle.addEventListener("click", function () {
        refreshEnabled = !refreshEnabled;
        sessionStorage.setItem(KEY_ENABLED, refreshEnabled ? "1" : "0");
        refreshToggle.textContent = refreshEnabled ? "Pausar" : "Reanudar";
      });

      setTimeout(function () {
        if (refreshEnabled) {
          window.location.reload();
        }
      }, refreshInterval);
    })();
  </script>
</body>
</html>
